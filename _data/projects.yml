- slug: retail-forecasting
  title: "Retail Demand Forecasting"
  subtitle: "Time-series models for inventory optimization"
  tags: [Python, Prophet, SQL, Tableau]
  status: "Complete"
  year: 2024
  summary: >
    Built an ensemble forecasting pipeline combining Facebook Prophet and XGBoost
    to predict weekly SKU-level demand across 200+ store locations.
    Reduced over-stock by 18% and cut stockout incidents by 23% QoQ.
  highlights:
    - Automated feature engineering pipeline ingesting 3 years of POS data
    - Cross-validation framework preserving temporal order
    - Tableau dashboard surfacing anomaly alerts to merchandising team
  body: |
    ### Background
    The merchandising team relied on static reorder-point rules that hadn't been
    updated since 2019. Seasonal spikes caused frequent stockouts; conservative
    safety stock kept capital tied up.

    ### Approach
    I evaluated SARIMA, Prophet, and gradient-boosted trees, ultimately blending
    Prophet trend + XGBoost residuals. Feature store in BigQuery; orchestrated
    with Airflow DAGs running nightly.

    ### Results
    Stockout rate fell from 4.1 % to 1.9 %; over-stock holding cost down ~$2.4 M
    annualised across the pilot region. Model now powers the auto-replenishment
    workflow in production.

- slug: dbt-analytics
  title: "Analytics Engineering Overhaul"
  subtitle: "dbt + BigQuery data warehouse migration"
  tags: [dbt, BigQuery, Python, Looker]
  status: "Complete"
  year: 2024
  summary: >
    Migrated a 400-table legacy Redshift warehouse to BigQuery using dbt,
    establishing a layered architecture (staging → intermediate → marts)
    and cutting average query time by 60%.
  highlights:
    - Defined 80+ dbt models with full lineage documentation
    - Automated data quality tests covering nulls, uniqueness, and referential integrity
    - Looker semantic layer rebuild from scratch
  body: |
    ### Context
    Engineering had outgrown Redshift; ad-hoc SQL scripts were duplicating
    business logic across 12 teams. A single source of truth didn't exist.

    ### What I built
    Staged raw data from five source systems (Salesforce, Stripe, internal
    microservices) into BigQuery. dbt models enforce naming conventions and
    are version-controlled. Every mart table ships with at least one dbt test.

    ### Impact
    Time-to-insight for new metric requests dropped from ~2 weeks to ~2 days.
    P95 dashboard load time improved from 28 s to 11 s.

