- slug: nlp-feedback
  title: "Customer Feedback NLP Pipeline"
  subtitle: "Sentiment & topic modelling at scale"
  tags: [Python, spaCy, BERTopic, FastAPI]
  status: "Complete"
  year: 2023
  summary: >
    Built an end-to-end NLP pipeline processing 50 k+ weekly support tickets
    and survey responses, surfacing emerging issues to product and CX teams
    within 24 hours.
  highlights:
    - Fine-tuned BERT classifier for 9-category intent labelling (F1 0.88)
    - BERTopic dynamic topic model with weekly diff report
    - FastAPI microservice serving predictions; latency p95 < 120 ms
  body: |
    ### Motivation
    Customer feedback lived in six disconnected tools. No one had a coherent
    picture of what users were actually saying.

    ### Architecture
    Raw text ingested from Zendesk + Qualtrics APIs → cleaned & deduplicated
    → intent classifier → topic model → written to BigQuery → Slack digest bot.

    ### Results
    Product team identified and resolved a checkout UX issue within 3 days of
    pipeline going live — previously would have taken a quarterly review cycle.

- slug: churn-model
  title: "Subscription Churn Prediction"
  subtitle: "Proactive retention for SaaS product"
  tags: [Python, XGBoost, MLflow, Airflow]
  status: "Complete"
  year: 2022
  summary: >
    Developed a 30-day churn propensity model for a 120 k subscriber base,
    enabling targeted retention campaigns that recovered an estimated $1.1 M ARR.
  highlights:
    - Feature engineering from product telemetry, billing events, and support history
    - SHAP explainability layer for Customer Success team
    - MLflow experiment tracking; model registry with A/B shadow deployment
  body: |
    ### Objective
    Identify at-risk customers early enough for CS to intervene before the
    cancel decision is made.

    ### Model
    XGBoost classifier trained on 18 months of labelled events. Key signals:
    login frequency drop, feature adoption regression, plan downgrade events.
    SHAP values exposed to CS reps via a Salesforce sidebar widget.

    ### Results
    30-day precision 0.74, recall 0.68. Pilot campaign reached 2,400 at-risk
    accounts; 31% converted to a retention offer. Estimated ARR recovery $1.1 M.
