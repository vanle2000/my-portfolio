bio: |
  I'm a data scientist and analytics engineer based in Houston, TX. My work
  sits at the intersection of statistical modelling, data infrastructure, and
  product analytics — I care about the full stack from raw ingestion to the
  chart that lands in the board deck.

  Before moving into data full-time, I studied Statistics and Computer Science
  at the University of Houston. I'm currently pursuing an M.S. in Statistics
  at Rice University part-time, with a research focus on forecast uncertainty
  quantification and LLM evaluation.

  Outside work, I'm into distance running, specialty coffee, and reading
  anything by Ursula K. Le Guin.

