quote:
  text: "As for the future, your task is not to foresee it, but to enable it."
  author: "Antoine de Saint-Exupéry, The Little Prince"

interests:
  - title: "Causal Inference & Experiment Design"
    description: >
      Designing experiments and quasi experimental analyses that move beyond
      correlation, to understand which interventions actually move the
      outcomes that matter and how to measure that reliably at scale.
  - title: "Uncertainty Quantification"
    description: >
      Building forecasting and prediction systems that communicate not just a
      point estimate but a calibrated range of confidence, so decision makers
      know how much to trust a number.
  - title: "Human and AI Collaboration in Analytics"
    description: >
      Studying how analysts and researchers work alongside ML and LLM tools,
      where automation helps, where it misleads, and how to design workflows
      that keep a human in the loop for judgment calls.
  - title: "AI Fairness & Safety"
    description: >
      Evaluating models for bias, robustness, and safe behaviour before they
      reach production, especially in scientific and healthcare contexts where
      errors carry real consequences.

experience:
  - lab: "Monje Lab"
    lab_url: "https://monjegroup.myportfolio.com/"
    institution: "University at Buffalo, Dept. of Chemical & Biological Engineering"
    pi: "Dr. Viviana Monje-Galván"
    years: "2022 – 2023"
    project: >
      I developed and validated a reproducible protocol for building realistic
      biological membrane models from complex lipid mixtures in molecular
      dynamics simulations, combining CHARMM force field parameterization with
      deep learning based protein structure prediction.
    motivation: >
      Most membrane simulations rely on simple single lipid bilayers that
      don't reflect real cell membranes. I wanted a protocol other researchers
      could reuse to model membranes that resemble those found in living
      cells, giving a more realistic foundation for studying how proteins and
      drugs interact with them.
    outcomes: >
      I published this protocol in the Journal of Visualized Experiments
      (JoVE), including trajectory analysis scripts for order parameters, area
      per lipid, membrane thickness, and lateral diffusion. These scripts are
      now a standard workflow in the lab.
    relevance: >
      This was my first time validating a computational model against
      experimental expectations under real uncertainty. It shaped my interest
      in uncertainty quantification and confirmed that I want a career
      building and stress testing models, not just running them once.

  - lab: "Liu Lab"
    lab_url: "https://www.uh.edu/pharmacy/about-us/directory-home/pps-faculty/xinli-liu/"
    institution: "University of Houston, College of Pharmacy"
    pi: "Dr. Xinli Liu"
    years: "2020 – 2022"
    project: >
      I designed and maintained Python data pipelines for mass spectrometry
      imaging datasets, transforming high dimensional spatial cell uptake data
      into analysis ready formats for studying nanoparticle drug delivery and
      nanomedicine resistance.
    motivation: >
      Nanoparticle based drug delivery can target tumors more precisely, but
      some cells develop resistance to it. The lab needed a way to turn raw
      imaging output, where every pixel is a full mass spectrum, into data we
      could analyze for patterns in resistance.
    outcomes: >
      I built preprocessing pipelines for baseline correction, peak alignment,
      and dimensionality reduction that made high dimensional cellular uptake
      data tractable for statistical analysis, and contributed to experiments
      testing nanoparticle formulations on cell culture models.
    relevance: >
      This experience pushed me from pre med toward data science full time. I
      realized the bottleneck in biomedical research is rarely the experiment
      itself, but the capacity to process and interpret the data it generates.
      It connects my interest in human and AI collaboration in analytics with
      my long term goal of working as a research data scientist on problems
      with real clinical stakes.
