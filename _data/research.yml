    ### Citation
    Campbell, O., Le, V., Aguirre, A., & Monje-Galvan, V. (2023). "Realistic
    Membrane Modeling Using Complex Lipid Mixtures in Simulation Studies."
    *Journal of Visualized Experiments*, e65712.

    ### Research Context
    Conducted at the **Monje Lab** (University at Buffalo, 2022–2023) under
    Dr. Viviana Monje-Galvan. The lab focuses on the physical chemistry of
    biological membranes — how lipid composition affects structure, dynamics,
    and protein interactions.

    ### My Contributions
    - Molecular dynamics trajectory analysis using Python and MDAnalysis
    - Membrane protein modelling pipeline incorporating deep learning-based
      structure prediction
    - CHARMM force field parameterisation for novel lipid species
    - Developed and validated the protocol published in JoVE

    ### Methods
    Simulations used the CHARMM36 force field with TIP3P water. Complex lipid
    mixtures were constructed using CHARMM-GUI. Trajectory analysis scripts
    computed order parameters, area per lipid, membrane thickness, and lateral
    diffusion coefficients. Deep learning tools (AlphaFold2 derivatives) were
    used to model transmembrane protein structures embedded in the membranes.

    ### Significance
    Provides a reproducible, step-by-step protocol enabling researchers to
    build biologically realistic membrane simulations — moving beyond simple
    single-lipid bilayers to mixtures that better reflect actual cell membrane
    composition.
