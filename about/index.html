---
layout: default
title: "About"
permalink: /about/
---

{% assign about = site.data.about %}

<main class="about">
  <div class="about__grid">
    <div class="about__photo">
      <img src="{{ about.photo | relative_url }}" alt="Photo of {{ about.name }}">
    </div>
    <div class="about__content">
      <h1 class="about__name">{{ about.name }}</h1>
      <p class="about__role">{{ about.role }}</p>
      <div class="about__bio">{{ about.bio }}</div>
    </div>
  </div>
</main>
