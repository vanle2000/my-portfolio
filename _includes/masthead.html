<header class="masthead">
  <div class="masthead__inner-wrap">
    <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title | default: "Site" }}</a>
    <nav class="masthead__menu" aria-label="Primary">
      <ul class="masthead__menu-list">
        {% for item in site.data.navigation.main %}
          <li class="masthead__menu-item">
            <a href="{{ item.url | relative_url }}"{% if page.url == item.url %} aria-current="page" class="is-active"{% endif %}>{{ item.title }}</a>
          </li>
        {% endfor %}
      </ul>
    </nav>
  </div>
</header>
